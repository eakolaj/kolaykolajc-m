<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kolaj Oluşturucu</title>

<style>
body{
margin:0;
background:#111;
color:white;
font-family:sans-serif;
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
padding:20px;
}

.upload{
display:flex;
gap:10px;
}

.collage{
width:960px;
height:1280px;
display:grid;
grid-template-columns:1fr 1fr;
grid-template-rows:1fr 1fr;
gap:6px;
background:#222;
}

.cell{
overflow:hidden;
}

.cell img{
width:100%;
height:100%;
object-fit:cover;
object-position:center;
}
</style>

</head>

<body>

<h2>Foto Kolaj (960x1280)</h2>

<div class="upload">
<input type="file" accept="image/*" onchange="loadImage(event,0)">
<input type="file" accept="image/*" onchange="loadImage(event,1)">
<input type="file" accept="image/*" onchange="loadImage(event,2)">
<input type="file" accept="image/*" onchange="loadImage(event,3)">
</div>

<div class="collage">
<div class="cell"><img id="img0"></div>
<div class="cell"><img id="img1"></div>
<div class="cell"><img id="img2"></div>
<div class="cell"><img id="img3"></div>
</div>

<script>
function loadImage(event,index){
const img=document.getElementById("img"+index);
img.src=URL.createObjectURL(event.target.files[0]);
}
</script>

</body>
</html>
