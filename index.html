<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>960x1280 Kolaj</title>

<style>

body{
margin:0;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.collage{
width:960px;
height:1280px;
display:grid;
grid-template-columns:1fr 1fr;
grid-template-rows:1fr 1fr;
gap:6px;
}

.collage div{
overflow:hidden;
}

.collage img{
width:100%;
height:100%;
object-fit:cover;
object-position:center;
}

</style>

</head>

<body>

<div class="collage">

<div><img src="1.jpg"></div>
<div><img src="2.jpg"></div>
<div><img src="3.jpg"></div>
<div><img src="4.jpg"></div>

</div>

</body>
</html>
