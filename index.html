<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Photo Grid</title>

<style>

body{
  margin:0;
  background:#111;
  font-family:Arial;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  width:100%;
  aspect-ratio:960/1280;
  overflow:hidden;
  background:black;
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

</style>
</head>

<body>

<div class="gallery">

<div class="card">
<img src="images/1.jpg">
</div>

<div class="card">
<img src="images/2.jpg">
</div>

<div class="card">
<img src="images/3.jpg">
</div>

<div class="card">
<img src="images/4.jpg">
</div>

</div>

</body>
</html>
